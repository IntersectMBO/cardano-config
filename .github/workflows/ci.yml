name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fourmolu:
    name: Formatting (fourmolu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install fourmolu 0.20.0.0
        run: |
          curl -fsSL https://github.com/fourmolu/fourmolu/releases/download/v0.20.0.0/fourmolu-0.20.0.0-linux-x86_64.zip -o /tmp/fourmolu.zip
          unzip -o /tmp/fourmolu.zip -d /tmp/fourmolu
          sudo install -m 0755 "$(find /tmp/fourmolu -type f | head -n1)" /usr/local/bin/fourmolu
          fourmolu --version

      - name: Check Haskell formatting
        run: ./scripts/fourmolize.sh

  cabal-format:
    name: Cabal formatting (cabal-gild)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cabal-gild 1.8.4.1
        run: |
          mkdir -p /tmp/cabal-gild
          curl -fsSL https://github.com/tfausak/cabal-gild/releases/download/1.8.4.1/cabal-gild-1.8.4.1-linux-x64.tar.gz -o /tmp/cabal-gild.tar.gz
          tar -xzf /tmp/cabal-gild.tar.gz -C /tmp/cabal-gild
          sudo install -m 0755 "$(find /tmp/cabal-gild -name cabal-gild -type f | head -n1)" /usr/local/bin/cabal-gild
          cabal-gild --version

      - name: Check cabal file formatting
        run: ./scripts/cabal-format.sh

  cue:
    name: CUE front-end (schema drift, vet, ajv)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      # Pin the CUE version: `cue import jsonschema` output (e.g. how defaults
      # are translated) varies across releases, so the committed cue/schema/gen_*
      # must be regenerated with this same version (see cue/README.md).
      - name: Install CUE 0.17.0
        run: |
          go install cuelang.org/go/cmd/cue@v0.17.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          "$(go env GOPATH)/bin/cue" version

      - name: Install just
        run: |
          sudo apt-get update
          sudo apt-get install -y just
          just --version

      - name: Install ajv-cli
        run: npm install -g ajv-cli

      # Generated-CUE drift gate, then vet + schema-validate + lint every config
      # and example (the per-file `just` recipes, looped over everything).
      - name: Check CUE front-end
        run: ./scripts/cue-ci.sh

  test:
    name: Build & test (GHC ${{ matrix.ghc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ghc: ['9.6.7', '9.8.4', '9.10.2', '9.12.2', '9.14.1']
    steps:
      - name: Install Haskell
        uses: input-output-hk/actions/haskell@latest
        id: setup-haskell
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: '3.16.1.0'

      # The cardano cryptography C libraries (libsodium, secp256k1, blst) that
      # cardano-crypto-class / cardano-ledger link against.
      - name: Install system dependencies
        uses: input-output-hk/actions/base@latest

      - uses: actions/checkout@v4

      - name: Update package indices
        run: cabal update

      - name: Cache cabal store and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.setup-haskell.outputs.cabal-store }}
            dist-newstyle
          key: ${{ runner.os }}-ghc${{ matrix.ghc }}-${{ hashFiles('cabal.project', '**/*.cabal') }}
          restore-keys: |
            ${{ runner.os }}-ghc${{ matrix.ghc }}-

      - name: Build
        run: cabal build all

      - name: Test
        run: cabal test all
