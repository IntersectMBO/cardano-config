name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fourmolu:
    name: Formatting (fourmolu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install fourmolu 0.20.0.0
        run: |
          curl -fsSL https://github.com/fourmolu/fourmolu/releases/download/v0.20.0.0/fourmolu-0.20.0.0-linux-x86_64.zip -o /tmp/fourmolu.zip
          unzip -o /tmp/fourmolu.zip -d /tmp/fourmolu
          sudo install -m 0755 "$(find /tmp/fourmolu -type f | head -n1)" /usr/local/bin/fourmolu
          fourmolu --version

      - name: Check Haskell formatting
        run: ./scripts/fourmolize.sh

  cabal-format:
    name: Cabal formatting (cabal-gild)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cabal-gild 1.8.4.1
        run: |
          mkdir -p /tmp/cabal-gild
          curl -fsSL https://github.com/tfausak/cabal-gild/releases/download/1.8.4.1/cabal-gild-1.8.4.1-linux-x64.tar.gz -o /tmp/cabal-gild.tar.gz
          tar -xzf /tmp/cabal-gild.tar.gz -C /tmp/cabal-gild
          sudo install -m 0755 "$(find /tmp/cabal-gild -name cabal-gild -type f | head -n1)" /usr/local/bin/cabal-gild
          cabal-gild --version

      - name: Check cabal file formatting
        run: ./scripts/cabal-format.sh

  test:
    name: Build & test (GHC ${{ matrix.ghc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ghc: ['9.6', '9.8', '9.10', '9.12', '9.14']
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: '3.16.1.0'

      - name: Cache cabal store and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.setup.outputs.cabal-store }}
            dist-newstyle
          key: ${{ runner.os }}-ghc${{ matrix.ghc }}-${{ hashFiles('cabal.project', '**/*.cabal') }}
          restore-keys: |
            ${{ runner.os }}-ghc${{ matrix.ghc }}-

      - name: Update package indices
        run: cabal update

      - name: Build
        run: cabal build all

      - name: Test
        run: cabal test all
